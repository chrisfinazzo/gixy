# Regression fixture for issue #100.
# `set` directives must be visible to nested blocks regardless of source order.
# This config must produce zero gixy issues.

user nginx;
worker_processes auto;
worker_rlimit_nofile 4096;
events {
    worker_connections 1024;
}

http {
    server_tokens off;
    default_type application/octet-stream;

    # Single server: location appears BEFORE the matching `set` directives.
    # Pre-fix this triggered "Can't find variable" INFO logs (not issues),
    # but it was the canonical reproducer; keeping the config in the
    # integration suite guards the analyzer against regressions where the
    # variable scope change might inadvertently trip another plugin.
    server {
        listen 80;
        server_name example.com;

        location @error {
            root $Root_Path/server-error-pages/_site;
        }

        location /api {
            proxy_set_header X-Bucket $Bucket;
            proxy_pass http://127.0.0.1:8080;
        }

        set $Root_Path /usr/share/nginx/html/www/vhosts_dir/example.com;
        set $Bucket "primary";
        root $Root_Path;
    }
}
