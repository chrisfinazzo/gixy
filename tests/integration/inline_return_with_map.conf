# =============================================================================
# INLINE RETURN BODIES WITH MAP VARIABLES
# =============================================================================
# Regression test for GitHub issue #105: variable resolution in multiline
# return directive bodies, including variables defined via map blocks.
# This config must NOT trigger any gixy warnings.
# =============================================================================

user nginx;
worker_processes auto;
worker_rlimit_nofile 65535;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
}

http {
    default_type application/octet-stream;
    server_tokens off;

    # Map block defines $canonical_host — must be resolvable in location below
    map $ssl_server_name $canonical_host {
        ""       "example.com";
        default  $ssl_server_name;
    }

    # SSL settings at http level
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    server {
        listen 443 ssl;
        server_name example.com;

        ssl_certificate /etc/ssl/certs/example.crt;
        ssl_certificate_key /etc/ssl/private/example.key;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Multiline return body using a map-defined variable
        location = /.well-known/security.txt {
            default_type text/plain;
            return 200
"Contact: mailto:security@example.com
Expires: 2028-02-16T00:00:00.000Z
Preferred-Languages: en
Canonical: https://$canonical_host/.well-known/security.txt
Bug-Bounty: False
";
        }

        # Multiline return body using only builtin variables
        location = /status.html {
            default_type text/html;
            return 200 "
<html>
<body>
    <h1>Status: $status</h1>
    <p>Request ID: $request_id</p>
    <p>Server: $server_name</p>
</body>
</html>
";
        }

        location / {
            root /var/www/html;
            index index.html;
        }
    }
}
