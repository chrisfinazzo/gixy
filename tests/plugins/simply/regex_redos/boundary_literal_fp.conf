# fp: Literal `/` after the inner [_0-9a-zA-Z-]+ is a safe boundary —
# `/` is not in the inner character class so each outer iteration is
# forced to consume `/`, eliminating ambiguous splits.
# Regression for https://github.com/dvershinin/gixy/issues/99
server {
	location ~ ^/([_0-9a-zA-Z-]+/)+core/cache/busting/1/core/(.*)$ {
		return 200;
	}
}
