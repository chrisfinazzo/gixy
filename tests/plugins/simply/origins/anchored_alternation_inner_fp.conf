# Companion to anchored_alternation_fp.conf. The named capture lives inside
# the `/` branch of the alternation rather than as a sibling, which the
# generator handled correctly even before the issue #111 fix. Locking in
# the parity: both forms must produce zero findings.
if ($http_referer ~ "^https?://example\.com($|/(?P<path>.*))") {
    set $normalised_referrer $path;
}
