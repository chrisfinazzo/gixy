# Regression: a regex whose generated candidate contains an empty DNS label
# (here, the double `\.\.`) caused `candidate_match.encode("idna")` to raise
# UnicodeError on Python 3.11+, aborting the entire audit. The exact-anchored
# pattern itself is FP for the origins check because no bypass is possible.
if ($http_referer ~ "^https?://example\.\.com$") {
    return 200;
}
