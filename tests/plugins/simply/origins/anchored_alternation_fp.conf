# Regression for issue #111: `$` inside an alternation whose group has a
# sibling token (here, `(?P<path>.*)`) was generating impossible-match
# candidates with `$` stranded mid-string, which the origins plugin then
# mutated into bogus bypasses like `http://example.com$aaaaa.evil.com`.
# Anchored, no real bypass — must produce zero findings.
if ($http_referer ~ "^https?://example\.com($|/)(?P<path>.*)") {
    set $normalised_referrer $path;
}
